<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Mehak ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ffdee9, #b5fffc);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  overflow: hidden;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  z-index: 2;
}

h1 {
  color: #ff4d6d;
}

#msg {
  min-height: 50px;
  margin-top: 10px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: red;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- Background Music -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>🎂 Happy Birthday Mehak 🎂</h1>
  <div id="msg"></div>
  <button onclick="reveal()">Click for Surprise ❤️</button>
</div>

<script>
// Typing effect
let text = "Mahi, you are not just my best friend... you are my favorite feeling ❤️";
let i = 0;
function type() {
  if(i < text.length){
    document.getElementById("msg").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();

// Surprise button
function reveal(){
  alert("Happy Birthday Mehak ❤️✨ You are special!");
}

// Floating hearts
function createHeart(){
  let heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
